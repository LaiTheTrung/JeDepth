# ============================================================================
# Config huấn luyện IINet với dữ liệu stereo depth custom
# Sử dụng: python train.py --cfg cfgs/iinet/iinet_custom.yaml
# ============================================================================

DATA:
    TRAIN_CSV: data/processed_data/train.csv
    VAL_CSV: data/processed_data/val.csv
    ROOT: data/processed_data
    CROP_SIZE: [384, 512]       # [H, W] - crop size cho training và validation
    AUGMENT: true               # Bật augmentation cho tập train
    TEST_IMAGES: test_images    # Thư mục chứa test stereo pairs (left/, right/)

MODEL:
    NAME: JeDepth
    MAX_DISP: &max_disp 192
    MATCHING_FEATURE_DIMS: 16
    CV_ENCODER_TYPE: multi_scale_encoder
    MATCHING_SCALE: 2
    MULTISCALE: 2
    DEPTH_DECODER_NAME: unet_pp
    OUT_SCALE: 4
    FEATURE_VOLUME_TYPE: ms_cost_volume
    DISP_SCALE: 16
    DOT_DIM: 1
    MATCHING_ENCODER_TYPE: unet
    REGRESSION_TOPK: 2
    FIND_UNUSED_PARAMETERS: true
    CKPT: -1
    PRETRAINED_MODEL: ''

OPTIMIZATION:
    BATCH_SIZE: 2
    AMP: true                   # Automatic Mixed Precision (giảm VRAM)
    NUM_EPOCHS: 50

    OPTIMIZER:
        NAME: AdamW
        LR: 0.001
        WEIGHT_DECAY: 0.0001

    SCHEDULER:
        NAME: MultiStepLR
        GAMMA: 0.5
        MILESTONES: [20, 35, 45]
        ON_EPOCH: true

TRAINER:
    EVAL_INTERVAL: 5            # Đánh giá mỗi 5 epoch
    CKPT_SAVE_INTERVAL: 5       # Lưu checkpoint mỗi 5 epoch (cùng lúc với eval)
    MAX_CKPT_SAVE_NUM: 10       # Số checkpoint tối đa giữ lại
    LOG_INTERVAL: 10            # Log mỗi N iteration
    TRAIN_VISUALIZATION: false
    EVAL_VISUALIZATION: true

    UNCER_ONLY: true            # Phase 1: chỉ train uncertainty/cost volume
    LOSS_WEIGHT:
        l1: [5, 2.5, 1.25, 0.6]
        grad: [1.0, 1.0, 0.5, 0.5]
        normal: 2.5
        focal: 1.0
